<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>법원직 영어 직독직해 퀴즈</title>

<style>
body{background:#f2f2f2;font-family:Arial;text-align:center;padding:6px;margin:0;}
.box{background:white;width:96%;max-width:900px;margin:auto;padding:32px 16px;border-radius:26px;}
img{width:260px;border-radius:22px;max-width:92%;}
button{font-size:26px;padding:16px 24px;margin:9px;border:none;border-radius:18px;background:#2f80ed;color:white;cursor:pointer;width:92%;max-width:620px;text-align:left;}
.mainBtn{text-align:center;}
.red{background:#e74c3c}.gray{background:#777}.green{background:#27ae60}
.question{font-size:32px;margin-top:24px;line-height:1.8;font-weight:bold;word-break:keep-all;}
#speech,#speechBox{background:#fff4cc;padding:18px;border-radius:20px;margin:18px 0;font-weight:bold;font-size:26px;line-height:1.6;}
#number,#score,#categoryText,#sourceText{color:#777;margin-top:12px;font-size:22px;}
#result{margin-top:24px;font-size:36px;font-weight:bold;}
#explanation{margin-top:22px;color:#555;line-height:1.8;font-size:26px;text-align:left;padding:0 10px;}
#quizScreen,#finalScreen,#wrongNoteScreen{display:none;}
.wrongItem{text-align:left;background:#f7f7f7;margin:12px;padding:16px;border-radius:16px;line-height:1.7;font-size:22px;}
h1{font-size:42px;margin-bottom:22px;line-height:1.25;}
h2{font-size:36px;}
@media (max-width:600px){
    .box{width:98%;padding:28px 10px;}
    img{width:320px;}
    h1{font-size:42px;}
    .question{font-size:34px;}
    button{font-size:28px;padding:18px 20px;}
    #speech,#speechBox{font-size:28px;}
    #explanation{font-size:28px;}
}
</style>
</head>

<body>
<div class="box">
<h1>법원직 영어 직독직해 퀴즈</h1>

<div id="startScreen">
    <img src="teacher.png">
    <div id="speech">문제 데이터를 불러오는 중입니다...</div>

    <button class="mainBtn" onclick="startQuiz('전체')">전체 랜덤</button>
    <button class="mainBtn" onclick="startQuiz('직독직해')">직독직해</button>

    <br>
    <button class="red mainBtn" onclick="showWrongNote()">오답노트 보기</button>
    <button class="green mainBtn" onclick="startWrongQuiz()">오답만 다시 풀기</button>
</div>

<div id="quizScreen">
    <img id="teacherImage" src="teacher.png">
    <div id="speechBox">끊어 읽기를 보고 가장 자연스러운 해석을 고르세요.</div>

    <div id="categoryText"></div>
    <div id="sourceText"></div>
    <div id="number"></div>
    <div id="score"></div>

    <div class="question" id="question"></div>

    <div id="answerButtons"></div>

    <br>
    <button class="mainBtn" onclick="nextQuestion()">다음 문제</button>
    <button class="gray mainBtn" onclick="goHome()">처음으로</button>

    <div id="result"></div>
    <div id="explanation"></div>
</div>

<div id="finalScreen">
    <img src="correct.png">
    <h2>퀴즈 완료!</h2>
    <div id="finalScore" style="font-size:34px;font-weight:bold;"></div>
    <p id="finalMessage"></p>
    <button class="mainBtn" onclick="goHome()">처음으로</button>
    <button class="mainBtn" onclick="restartSameQuiz()">다시 풀기</button>
    <button class="red mainBtn" onclick="showWrongNote()">오답노트 보기</button>
</div>

<div id="wrongNoteScreen">
    <h2>오답노트</h2>
    <div id="wrongList"></div>
    <button class="green mainBtn" onclick="startWrongQuiz()">오답만 다시 풀기</button>
    <button class="red mainBtn" onclick="clearWrongNote()">오답노트 삭제</button>
    <button class="mainBtn" onclick="goHome()">처음으로</button>
</div>

</div>

<script>
let quizData = [];
let selectedQuiz = [];
let currentQuestion = 0;
let score = 0;
let answered = false;
let quizMode = "일반";

window.onload = function(){
    loadCSVAutomatically();
};

function loadCSVAutomatically(){
    fetch("questions.csv?time=" + new Date().getTime(), {cache:"no-store"})
    .then(response => {
        if(!response.ok){
            throw new Error("questions.csv 파일을 찾을 수 없습니다.");
        }
        return response.text();
    })
    .then(text => {
        quizData = parseCSV(text);

        document.getElementById("speech").innerHTML =
        "문제 " + quizData.length + "개를 불러왔습니다. 유형을 선택하세요.";
    })
    .catch(error => {
        document.getElementById("speech").innerHTML =
        "문제 파일을 자동으로 불러오지 못했습니다.<br>questions.csv 파일명과 위치를 확인하세요.";
        alert("questions.csv 자동 로딩 실패");
    });
}

function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const data = [];

    for(let i = 1; i < lines.length; i++){
        const line = lines[i].trim();
        if(line === ""){ continue; }

        const row = line.split(",");

        if(row.length >= 10){
            data.push({
                type: row[0].trim(),
                category: row[1].trim(),
                source: row[2].trim(),
                question: row[3].trim().replace(/^"|"$/g, ""),
                choice1: row[4].trim().replace(/^"|"$/g, ""),
                choice2: row[5].trim().replace(/^"|"$/g, ""),
                choice3: row[6].trim().replace(/^"|"$/g, ""),
                choice4: row[7].trim().replace(/^"|"$/g, ""),
                answer: row[8].trim(),
                explanation: row.slice(9).join(",").trim().replace(/^"|"$/g, "")
            });
        }
    }

    return data;
}

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function startQuiz(category){
    if(quizData.length === 0){
        alert("문제 데이터를 아직 불러오지 못했습니다.");
        return;
    }

    quizMode = category;

    if(category === "전체"){
        selectedQuiz = shuffle([...quizData]);
    }else{
        selectedQuiz = shuffle(quizData.filter(q => q.category === category));
    }

    if(selectedQuiz.length === 0){
        alert("해당 유형의 문제가 없습니다.");
        return;
    }

    startSelectedQuiz();
}

function startWrongQuiz(){
    const wrongNote = JSON.parse(localStorage.getItem("englishWrongNote")) || [];

    if(wrongNote.length === 0){
        alert("저장된 오답이 없습니다.");
        return;
    }

    quizMode = "오답노트";
    selectedQuiz = shuffle([...wrongNote]);
    startSelectedQuiz();
}

function startSelectedQuiz(){
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function loadQuestion(){
    let q = selectedQuiz[currentQuestion];

    document.getElementById("teacherImage").src = "teacher.png";
    document.getElementById("speechBox").innerHTML = "끊어 읽기를 보고 가장 자연스러운 해석을 고르세요.";
    document.getElementById("categoryText").innerHTML = "유형: " + q.category;
    document.getElementById("sourceText").innerHTML = "출처: " + q.source;
    document.getElementById("number").innerHTML =
    "문제 " + (currentQuestion + 1) + " / " + selectedQuiz.length + " (" + quizMode + ")";

    document.getElementById("score").innerHTML =
    "점수: " + score + " / " + selectedQuiz.length;

    document.getElementById("question").innerHTML = q.question.replaceAll("/", "<br>/ ");
    document.getElementById("result").innerHTML = "";
    document.getElementById("explanation").innerHTML = "";

    makeAnswerButtons(q);
    answered = false;
}

function makeAnswerButtons(q){
    const area = document.getElementById("answerButtons");
    area.innerHTML = "";

    area.innerHTML += '<button onclick="checkAnswer(\'1\')">1. ' + q.choice1 + '</button>';
    area.innerHTML += '<button onclick="checkAnswer(\'2\')">2. ' + q.choice2 + '</button>';
    area.innerHTML += '<button onclick="checkAnswer(\'3\')">3. ' + q.choice3 + '</button>';
    area.innerHTML += '<button onclick="checkAnswer(\'4\')">4. ' + q.choice4 + '</button>';
}

function checkAnswer(answer){
    if(answered){ return; }

    answered = true;
    let q = selectedQuiz[currentQuestion];

    if(answer === q.answer){
        score++;
        document.getElementById("result").innerHTML = "정답입니다!";
        document.getElementById("teacherImage").src = "correct.png";
        document.getElementById("speechBox").innerHTML = "좋습니다. 문장 구조를 잘 파악했습니다.";

        if(quizMode === "오답노트"){
            removeFromWrongNote(q);
        }

    }else{
        document.getElementById("result").innerHTML = "오답입니다.";
        document.getElementById("teacherImage").src = "wrong.png";
        document.getElementById("speechBox").innerHTML = "오답입니다. 끊어 읽기와 해설을 다시 확인하세요.";
        saveWrongQuestion(q);
    }

    document.getElementById("score").innerHTML =
    "점수: " + score + " / " + selectedQuiz.length;

    const correctChoice = q["choice" + q.answer];

    document.getElementById("explanation").innerHTML =
    "정답: " + q.answer + ". " + correctChoice + "<br><br>" +
    "해설: " + q.explanation;
}

function nextQuestion(){
    if(!answered){
        alert("먼저 답을 선택하세요.");
        return;
    }

    if(currentQuestion === selectedQuiz.length - 1){
        showFinalScreen();
        return;
    }

    currentQuestion++;
    loadQuestion();
}

function showFinalScreen(){
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "block";

    document.getElementById("finalScore").innerHTML =
    "최종 점수: " + score + " / " + selectedQuiz.length;

    let percent = Math.round((score / selectedQuiz.length) * 100);
    let message = "";

    if(percent >= 90){
        message = "매우 좋습니다. 긴 문장 구조 파악이 안정적입니다.";
    }else if(percent >= 70){
        message = "좋습니다. 오답 문장의 끊어 읽기를 반복하세요.";
    }else{
        message = "직독직해 구조부터 다시 반복하는 것이 좋습니다.";
    }

    document.getElementById("finalMessage").innerHTML = message;
}

function restartSameQuiz(){
    selectedQuiz = shuffle([...selectedQuiz]);
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function saveWrongQuestion(q){
    let wrongNote = JSON.parse(localStorage.getItem("englishWrongNote")) || [];
    let exists = wrongNote.some(item => item.question === q.question);

    if(!exists){
        wrongNote.push(q);
        localStorage.setItem("englishWrongNote", JSON.stringify(wrongNote));
    }
}

function removeFromWrongNote(q){
    let wrongNote = JSON.parse(localStorage.getItem("englishWrongNote")) || [];
    wrongNote = wrongNote.filter(item => item.question !== q.question);
    localStorage.setItem("englishWrongNote", JSON.stringify(wrongNote));
}

function showWrongNote(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "block";

    let wrongNote = JSON.parse(localStorage.getItem("englishWrongNote")) || [];
    let html = "";

    if(wrongNote.length === 0){
        html = "<p>아직 저장된 오답이 없습니다.</p>";
    }else{
        wrongNote.forEach((q, index) => {
            html += "<div class='wrongItem'>";
            html += "<b>" + (index + 1) + ". [" + q.category + "]</b><br>";
            html += q.question.replaceAll("/", "<br>/ ") + "<br><br>";
            html += "1. " + q.choice1 + "<br>";
            html += "2. " + q.choice2 + "<br>";
            html += "3. " + q.choice3 + "<br>";
            html += "4. " + q.choice4 + "<br>";
            html += "<b>정답: " + q.answer + "</b><br>";
            html += "<span style='color:#555;'>" + q.explanation + "</span>";
            html += "</div>";
        });
    }

    document.getElementById("wrongList").innerHTML = html;
}

function clearWrongNote(){
    const ok = confirm("오답노트를 모두 삭제할까요?");
    if(ok){
        localStorage.removeItem("englishWrongNote");
        showWrongNote();
    }
}

function goHome(){
    document.getElementById("startScreen").style.display = "block";
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";
}
</script>

</body>
</html>
