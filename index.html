<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>법원직 영어 퀴즈</title>

<style>
body{
    background:#f2f2f2;
    font-family:Arial;
    text-align:center;
    padding:6px;
    margin:0;
}

.box{
    background:white;
    width:96%;
    max-width:900px;
    margin:auto;
    padding:32px 16px;
    border-radius:26px;
}

img{
    width:260px;
    border-radius:22px;
    max-width:92%;
}

button{
    font-size:26px;
    padding:16px 24px;
    margin:9px;
    border:none;
    border-radius:18px;
    background:#2f80ed;
    color:white;
    cursor:pointer;
    width:92%;
    max-width:680px;
    text-align:left;
}

.mainBtn{
    text-align:center;
}

.red{background:#e74c3c}
.gray{background:#777}
.green{background:#27ae60}
.yellow{background:#f39c12}

.question{
    font-size:32px;
    margin-top:24px;
    line-height:1.8;
    font-weight:bold;
    word-break:keep-all;
}

#speech,#speechBox{
    background:#fff4cc;
    padding:18px;
    border-radius:20px;
    margin:18px 0;
    font-weight:bold;
    font-size:26px;
    line-height:1.6;
}

#number,#score,#categoryText{
    color:#777;
    margin-top:12px;
    font-size:22px;
}

#result{
    margin-top:24px;
    font-size:36px;
    font-weight:bold;
}

#explanation,#tipBox{
    margin-top:22px;
    color:#555;
    line-height:1.8;
    font-size:26px;
    text-align:left;
    padding:18px;
    border-radius:18px;
}

#explanation{
    background:white;
}

#tipBox{
    background:#eef7ff;
    display:none;
}

#quizScreen,#finalScreen,#wrongNoteScreen{
    display:none;
}

.wrongItem{
    text-align:left;
    background:#f7f7f7;
    margin:12px;
    padding:16px;
    border-radius:16px;
    line-height:1.7;
    font-size:22px;
}

h1{
    font-size:42px;
    margin-bottom:22px;
    line-height:1.25;
}

h2{
    font-size:36px;
}

@media (max-width:600px){

    .box{
        width:98%;
        padding:28px 10px;
    }

    img{
        width:320px;
    }

    h1{
        font-size:42px;
    }

    .question{
        font-size:34px;
    }

    button{
        font-size:28px;
        padding:18px 20px;
    }

    #speech,#speechBox,#explanation,#tipBox{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="box">

<h1>법원직 영어 퀴즈</h1>

<div id="startScreen">

    <img src="teacher.png">

    <div id="speech">
        문제 데이터를 불러오는 중입니다...
    </div>

    <button class="green mainBtn" onclick="turnVoiceOn()">
        문제 음성 켜기
    </button>

    <button class="gray mainBtn" onclick="turnVoiceOff()">
        문제 음성 끄기
    </button>

    <button class="mainBtn" onclick="startQuiz('전체')">
        전체 랜덤
    </button>

    <button class="mainBtn" onclick="startQuiz('빈칸추론형')">
        빈칸추론형
    </button>

    <button class="mainBtn" onclick="startQuiz('문장삽입형')">
        문장삽입형
    </button>

    <button class="mainBtn" onclick="startQuiz('어법오류찾기')">
        어법 오류 찾기
    </button>

    <br>

    <button class="red mainBtn" onclick="showWrongNote()">
        오답노트 보기
    </button>

    <button class="green mainBtn" onclick="startWrongQuiz()">
        오답만 다시 풀기
    </button>

</div>

<div id="quizScreen">

    <img id="teacherImage" src="teacher.png">

    <div id="speechBox">
        문제를 읽고 가장 알맞은 답을 고르세요.
    </div>

    <div id="categoryText"></div>
    <div id="number"></div>
    <div id="score"></div>

    <div class="question" id="question"></div>

    <div id="answerButtons"></div>
<button class="yellow mainBtn" onclick="toggleTip()">Tip 보기 / 숨기기</button>
<div id="tipBox"></div>
    <button class="yellow mainBtn" onclick="toggleTip()">
        Tip 보기 / 숨기기
    </button>

    <div id="tipBox"></div>

    <br>

    <button class="mainBtn" onclick="nextQuestion()">
        다음 문제
    </button>

    <button class="gray mainBtn" onclick="goHome()">
        처음으로
    </button>

    <div id="result"></div>

    <div id="explanation"></div>

</div>

<div id="finalScreen">

    <img src="correct.png">

    <h2>퀴즈 완료!</h2>

    <div id="finalScore"
         style="font-size:34px;font-weight:bold;">
    </div>

    <p id="finalMessage"></p>

    <button class="mainBtn" onclick="goHome()">
        처음으로
    </button>

    <button class="mainBtn" onclick="restartSameQuiz()">
        다시 풀기
    </button>

    <button class="red mainBtn" onclick="showWrongNote()">
        오답노트 보기
    </button>

</div>

<div id="wrongNoteScreen">

    <h2>오답노트</h2>

    <div id="wrongList"></div>

    <button class="green mainBtn"
            onclick="startWrongQuiz()">
        오답만 다시 풀기
    </button>

    <button class="red mainBtn"
            onclick="clearWrongNote()">
        오답노트 삭제
    </button>

    <button class="mainBtn"
            onclick="goHome()">
        처음으로
    </button>

</div>

</div>

<script>

let quizData = [];
let selectedQuiz = [];
let currentQuestion = 0;
let score = 0;
let answered = false;
let quizMode = "일반";
let voiceOn = false;

window.onload = function(){
    loadCSVAutomatically();
};

function fixText(text){

    return (text || "")
    .replaceAll("**","______")
    .replaceAll("self-**","self-defense");
}

function formatQuestion(text){

    let fixed = fixText(text);

    return fixed
    .replace("고르시오.", "고르시오.<br><br>")
    .replace("[주어진 문장]",
             "<br><br><b>[주어진 문장]</b><br>")
    .replaceAll(" ( [1] )","<br><br>( [1] )")
    .replaceAll(" ( [2] )","<br><br>( [2] )")
    .replaceAll(" ( [3] )","<br><br>( [3] )")
    .replaceAll(" ( [4] )","<br><br>( [4] )");
}

function speakQuestion(text){

    if(!voiceOn){ return; }

    window.speechSynthesis.cancel();

    let cleaned =
        fixText(text)
        .replace(/\s+/g," ")
        .trim();

    let parts = [];

    if(cleaned.includes("고르시오.")){

        let split = cleaned.split("고르시오.");

        parts.push({
            text: split[0] + "고르시오.",
            lang:"ko-KR"
        });

        parts.push({
            text: split.slice(1)
            .join("고르시오.")
            .trim(),
            lang:"en-US"
        });

    }else{

        parts.push({
            text: cleaned,
            lang:"en-US"
        });
    }

    speakParts(parts,0);
}

function speakParts(parts,index){

    if(index >= parts.length){
        return;
    }

    const msg =
        new SpeechSynthesisUtterance(parts[index].text);

    msg.lang = parts[index].lang;
    msg.rate = 0.82;
    msg.pitch = 1;

    msg.onend = function(){

        setTimeout(function(){

            speakParts(parts,index+1);

        },1000);
    };

    window.speechSynthesis.speak(msg);
}

function turnVoiceOn(){

    voiceOn = true;

    alert("문제 음성이 켜졌습니다.");
}

function turnVoiceOff(){

    voiceOn = false;

    window.speechSynthesis.cancel();

    alert("문제 음성이 꺼졌습니다.");
}

function loadCSVAutomatically(){

    fetch("questions.csv?time=" +
        new Date().getTime(),
        {cache:"no-store"}
    )

    .then(response => {

        if(!response.ok){
            throw new Error("CSV 없음");
        }

        return response.text();
    })

    .then(text => {

        quizData = parseCSV(text);

        document.getElementById("speech")
        .innerHTML =
        "문제 " + quizData.length +
        "개를 불러왔습니다.";

    })

    .catch(error => {

        document.getElementById("speech")
        .innerHTML =
        "questions.csv 파일을 찾을 수 없습니다.";

        alert("questions.csv 로딩 실패");
    });
}

function parseCSVLine(line){

    const result = [];

    let current = "";
    let inQuotes = false;

    for(let i=0;i<line.length;i++){

        const char = line[i];

        if(char === '"' && line[i+1] === '"'){

            current += '"';
            i++;

        }else if(char === '"'){

            inQuotes = !inQuotes;

        }else if(char === "," && !inQuotes){

            result.push(current);
            current = "";

        }else{

            current += char;
        }
    }

    result.push(current);

    return result;
}

function parseCSV(text){

    const lines =
        text.trim().split(/\r?\n/);

    const data = [];

    for(let i=1;i<lines.length;i++){

        const line = lines[i].trim();

        if(line === ""){
            continue;
        }

        const row = parseCSVLine(line);

        data.push({

            number: row[0],
            category: row[1],
            question: fixText(row[2]),

            choice1: row[3],
            choice2: row[4],
            choice3: row[5],
            choice4: row[6],

            answer: row[7],

            explanation: row[8] || "",
            translation: row[9] || "",
            hint: row[10] || ""
        });
    }

    return data;
}

function shuffle(array){

    return array.sort(() =>
        Math.random() - 0.5);
}

function startQuiz(category){

    if(category === "전체"){

        selectedQuiz =
            shuffle([...quizData]);

    }else{

        selectedQuiz =
            shuffle(
                quizData.filter(
                    q => q.category === category
                )
            );
    }

    quizMode = category;

    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("startScreen")
    .style.display = "none";

    document.getElementById("quizScreen")
    .style.display = "block";

    loadQuestion();
}

function loadQuestion(){

    let q = selectedQuiz[currentQuestion];

    document.getElementById("teacherImage")
    .src = "teacher.png";

    document.getElementById("categoryText")
    .innerHTML = "유형: " + q.category;

    document.getElementById("number")
    .innerHTML =
    "문제 " +
    (currentQuestion+1) +
    " / " +
    selectedQuiz.length;

    document.getElementById("score")
    .innerHTML =
    "점수: " + score;

    document.getElementById("question")
    .innerHTML =
    formatQuestion(q.question);

    document.getElementById("result")
    .innerHTML = "";

    document.getElementById("explanation")
    .innerHTML = "";

    document.getElementById("tipBox")
    .style.display = "none";

    document.getElementById("tipBox")
    .innerHTML = "";

    makeAnswerButtons(q);

    answered = false;

    speakQuestion(q.question);
}

function makeAnswerButtons(q){

    const area =
        document.getElementById("answerButtons");

    area.innerHTML = "";

    area.innerHTML +=
    '<button onclick="checkAnswer(\'1\')">1. '
    + q.choice1 + '</button>';

    area.innerHTML +=
    '<button onclick="checkAnswer(\'2\')">2. '
    + q.choice2 + '</button>';

    area.innerHTML +=
    '<button onclick="checkAnswer(\'3\')">3. '
    + q.choice3 + '</button>';

    area.innerHTML +=
    '<button onclick="checkAnswer(\'4\')">4. '
    + q.choice4 + '</button>';
}

function toggleTip(){

    const box =
        document.getElementById("tipBox");

    const q =
        selectedQuiz[currentQuestion];

    if(box.style.display === "block"){

        box.style.display = "none";
        return;
    }

    box.style.display = "block";

    let correctText =
        q["choice" + q.answer];

    box.innerHTML =
        "<b>Tip</b><br><br>" +

        "<b>힌트:</b><br>" +
        q.hint + "<br><br>" +

        "<b>문장 전체 해석:</b><br>" +
        q.translation + "<br><br>" +

        "<b>핵심 표현:</b><br>" +
        correctText;
}

function checkAnswer(answer){

    if(answered){
        return;
    }

    answered = true;

    let q =
        selectedQuiz[currentQuestion];

    if(answer === q.answer){

        score++;

        document.getElementById("result")
        .innerHTML = "정답입니다!";

        document.getElementById("teacherImage")
        .src = "correct.png";

    }else{

        document.getElementById("result")
        .innerHTML = "오답입니다.";

        document.getElementById("teacherImage")
        .src = "wrong.png";
    }

    document.getElementById("score")
    .innerHTML =
    "점수: " + score;

    let correctText =
        q["choice" + q.answer];

    document.getElementById("explanation")
    .innerHTML =
        "정답: " +
        q.answer +
        ". " +
        correctText +
        "<br><br>" +
        "해설: " +
        q.explanation;
}

function nextQuestion(){

    if(!answered){

        alert("먼저 답을 선택하세요.");
        return;
    }

    if(currentQuestion ===
        selectedQuiz.length - 1){

        showFinalScreen();
        return;
    }

    currentQuestion++;

    loadQuestion();
}

function showFinalScreen(){

    document.getElementById("quizScreen")
    .style.display = "none";

    document.getElementById("finalScreen")
    .style.display = "block";

    document.getElementById("finalScore")
    .innerHTML =
    "최종 점수: " +
    score +
    " / " +
    selectedQuiz.length;

    let percent =
        Math.round(
            score /
            selectedQuiz.length
            * 100
        );

    let message = "";

    if(percent >= 90){

        message =
        "매우 좋습니다.";

    }else if(percent >= 70){

        message =
        "좋습니다.";

    }else{

        message =
        "오답노트를 반복하세요.";
    }

    document.getElementById("finalMessage")
    .innerHTML = message;
}

function restartSameQuiz(){

    selectedQuiz =
        shuffle([...selectedQuiz]);

    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("finalScreen")
    .style.display = "none";

    document.getElementById("quizScreen")
    .style.display = "block";

    loadQuestion();
}

function goHome(){

    window.speechSynthesis.cancel();

    document.getElementById("startScreen")
    .style.display = "block";

    document.getElementById("quizScreen")
    .style.display = "none";

    document.getElementById("finalScreen")
    .style.display = "none";

    document.getElementById("wrongNoteScreen")
    .style.display = "none";
}

</script>

</body>
</html>
