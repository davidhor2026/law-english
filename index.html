<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>법원직 영어 퀴즈</title>
<style>
body{
    background:#f2f2f2;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:6px;
    margin:0;
}
.box{
    background:white;
    width:96%;
    max-width:900px;
    margin:auto;
    padding:32px 16px;
    border-radius:26px;
}
img{
    width:260px;
    border-radius:22px;
    max-width:92%;
}
button{
    font-size:26px;
    padding:16px 24px;
    margin:9px;
    border:none;
    border-radius:18px;
    background:#2f80ed;
    color:white;
    cursor:pointer;
    width:92%;
    max-width:680px;
    text-align:left;
}
.mainBtn{text-align:center;}
.red{background:#e74c3c}
.gray{background:#777}
.green{background:#27ae60}
.yellow{background:#f39c12}
.question{
    font-size:30px;
    margin-top:24px;
    line-height:1.8;
    font-weight:bold;
    word-break:keep-all;
}
#speech,#speechBox{
    background:#fff4cc;
    padding:18px;
    border-radius:20px;
    margin:18px 0;
    font-weight:bold;
    font-size:26px;
    line-height:1.6;
}
#conceptBox{
    background:#fff8e6;
    border-left:8px solid #f39c12;
    padding:18px;
    border-radius:18px;
    margin:18px 0;
    text-align:left;
    font-size:25px;
    line-height:1.7;
    color:#333;
    font-weight:bold;
}
#number,#score,#categoryText{
    color:#777;
    margin-top:12px;
    font-size:22px;
}
#result{
    margin-top:24px;
    font-size:36px;
    font-weight:bold;
}
#explanation,#tipBox{
    margin-top:22px;
    color:#555;
    line-height:1.8;
    font-size:26px;
    text-align:left;
    padding:18px;
    border-radius:18px;
}
#explanation{background:white;}
#tipBox{
    background:#eef7ff;
    display:none;
}
#quizScreen,#finalScreen,#wrongNoteScreen{display:none;}
.wrongItem{
    text-align:left;
    background:#f7f7f7;
    margin:12px;
    padding:16px;
    border-radius:16px;
    line-height:1.7;
    font-size:22px;
}
h1{
    font-size:42px;
    margin-bottom:22px;
    line-height:1.25;
}
h2{font-size:36px;}
.givenBox{
    background:#fff8e6;
    border:2px solid #f3c66b;
    border-radius:16px;
    padding:16px;
    margin:18px 0;
    font-size:26px;
    line-height:1.7;
    font-weight:bold;
    color:#222;
    text-align:left;
}
.passageBox{
    margin-top:18px;
    padding:14px;
    background:#fafafa;
    border-radius:16px;
    font-size:28px;
    line-height:1.9;
    font-weight:bold;
    color:#111;
    text-align:left;
}
.insertMark{
    display:inline-block;
    background:#eef4ff;
    border:2px solid #2f80ed;
    color:#2f80ed;
    border-radius:10px;
    padding:2px 8px;
    margin:6px 4px;
    font-weight:bold;
}
@media (max-width:600px){
    .box{width:98%;padding:28px 10px;}
    img{width:320px;}
    h1{font-size:42px;}
    .question{font-size:30px;}
    button{font-size:24px;padding:15px 18px;}
    #speech,#speechBox,#explanation,#tipBox,#conceptBox{font-size:24px;}
    .givenBox,.passageBox{font-size:24px;}
}
</style>
</head>

<body>
<div class="box">
<h1>법원직 영어 퀴즈</h1>

<div id="startScreen">
    <img src="teacher.png">
    <div id="speech">문제 데이터를 불러오는 중입니다...</div>

    <button class="green mainBtn" onclick="turnVoiceOn()">문제 음성 켜기</button>
    <button class="gray mainBtn" onclick="turnVoiceOff()">문제 음성 끄기</button>

    <button class="mainBtn" onclick="startQuiz('전체')">전체 랜덤</button>
    <button class="mainBtn" onclick="startQuiz('빈칸추론형')">빈칸추론형</button>
    <button class="mainBtn" onclick="startQuiz('문장삽입형')">문장삽입형</button>
    <button class="mainBtn" onclick="startQuiz('어법오류찾기')">어법 오류 찾기</button>

    <br>
    <button class="red mainBtn" onclick="showWrongNote()">오답노트 보기</button>
    <button class="green mainBtn" onclick="startWrongQuiz()">오답만 다시 풀기</button>
</div>

<div id="quizScreen">
    <img id="teacherImage" src="teacher.png">
    <div id="speechBox">문제를 읽고 가장 알맞은 답을 고르세요.</div>

    <div id="categoryText"></div>
    <div id="number"></div>
    <div id="score"></div>
    <div id="conceptBox"></div>

    <div class="question" id="question"></div>
    <div id="answerButtons"></div>

    <button class="yellow mainBtn" onclick="toggleTip()">Tip 보기 / 숨기기</button>
    <div id="tipBox"></div>

    <br>
    <button class="mainBtn" onclick="nextQuestion()">다음 문제</button>
    <button class="gray mainBtn" onclick="goHome()">처음으로</button>

    <div id="result"></div>
    <div id="explanation"></div>
</div>

<div id="finalScreen">
    <img src="correct.png">
    <h2>퀴즈 완료!</h2>
    <div id="finalScore" style="font-size:34px;font-weight:bold;"></div>
    <p id="finalMessage"></p>
    <button class="mainBtn" onclick="goHome()">처음으로</button>
    <button class="mainBtn" onclick="restartSameQuiz()">다시 풀기</button>
    <button class="red mainBtn" onclick="showWrongNote()">오답노트 보기</button>
</div>

<div id="wrongNoteScreen">
    <h2>오답노트</h2>
    <div id="wrongList"></div>
    <button class="green mainBtn" onclick="startWrongQuiz()">오답만 다시 풀기</button>
    <button class="red mainBtn" onclick="clearWrongNote()">오답노트 삭제</button>
    <button class="mainBtn" onclick="goHome()">처음으로</button>
</div>
</div>

<script>
let quizData = [];
let selectedQuiz = [];
let currentQuestion = 0;
let score = 0;
let answered = false;
let quizMode = "일반";
let voiceOn = false;

const WRONG_NOTE_KEY = "courtEnglishWrongNoteFinalV3";

window.onload = function(){
    loadCSVAutomatically();
};

function fixText(text){
    return (text || "")
        .replaceAll("**","______")
        .replaceAll("self-**","self-defense");
}

function decodeBreaks(text){
    return fixText(text || "").replace(/\\n/g, "\n");
}

function escapeHTML(text){
    return (text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
}

function toHTMLWithBreaks(text){
    return escapeHTML(decodeBreaks(text)).replace(/\n/g, "<br>");
}

function firstSentenceSplit(text){
    const m = text.match(/\.\s+/);
    if(!m){ return [text.trim(), ""]; }
    const end = m.index + 1;
    return [text.slice(0,end).trim(), text.slice(end).trim()];
}

function formatQuestion(q){
    let text = decodeBreaks(q.question || "");

    if(q.category === "문장삽입형"){
        const instruction = "주어진 문장이 들어가기 가장 적절한 곳을 고르시오.";
        const marker = "[주어진 문장]";

        text = text.replace(instruction, "").trim();

        let givenSentence = "";
        let passage = text;

        if(text.includes(marker)){
            const parts = text.split(marker);
            const before = parts[0].trim();
            const after = parts.slice(1).join(marker).trim();

            if(before.length > 0){
                passage = before;
                givenSentence = after;
            }else{
                const blocks = after.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
                if(blocks.length >= 2){
                    givenSentence = blocks[0];
                    passage = blocks.slice(1).join("\n\n");
                }else{
                    const pair = firstSentenceSplit(after);
                    givenSentence = pair[0];
                    passage = pair[1];
                }
            }
        }

        passage = passage
            .replaceAll("( [1] )", "[[MARK1]]")
            .replaceAll("( [2] )", "[[MARK2]]")
            .replaceAll("( [3] )", "[[MARK3]]")
            .replaceAll("( [4] )", "[[MARK4]]");

        passage = toHTMLWithBreaks(passage)
            .replaceAll("[[MARK1]]", "<span class='insertMark'>[1]</span>")
            .replaceAll("[[MARK2]]", "<span class='insertMark'>[2]</span>")
            .replaceAll("[[MARK3]]", "<span class='insertMark'>[3]</span>")
            .replaceAll("[[MARK4]]", "<span class='insertMark'>[4]</span>");

        let html = "";
        html += "<div><b>주어진 문장이 들어가기 가장 적절한 곳을 고르시오.</b></div>";

        if(givenSentence !== ""){
            html += "<div class='givenBox'><b>[주어진 문장]</b><br><br>" + toHTMLWithBreaks(givenSentence) + "</div>";
        }

        html += "<div class='passageBox'>" + passage + "</div>";

        return html;
    }

    let fixed = toHTMLWithBreaks(text);

    fixed = fixed
        .replace("고르시오.", "고르시오.<br><br>")
        .replace(/\(1\)/g, '<span class="insertMark">(1)</span>')
        .replace(/\(2\)/g, '<span class="insertMark">(2)</span>')
        .replace(/\(3\)/g, '<span class="insertMark">(3)</span>')
        .replace(/\(4\)/g, '<span class="insertMark">(4)</span>');

    return fixed;
}

function speakQuestion(text){
    if(!voiceOn){ return; }

    window.speechSynthesis.cancel();

    let cleaned = decodeBreaks(text)
        .replace("[주어진 문장]", ". 주어진 문장.")
        .replace(/\s+/g," ")
        .trim();

    let parts = [];

    if(cleaned.includes("고르시오.")){
        let split = cleaned.split("고르시오.");

        parts.push({
            text: split[0] + "고르시오.",
            lang:"ko-KR"
        });

        parts.push({
            text: split.slice(1).join("고르시오.").trim(),
            lang:"en-US"
        });
    }else{
        parts.push({
            text: cleaned,
            lang:"en-US"
        });
    }

    speakParts(parts,0);
}

function speakParts(parts,index){
    if(index >= parts.length){ return; }
    if(!parts[index].text){
        speakParts(parts,index+1);
        return;
    }

    const msg = new SpeechSynthesisUtterance(parts[index].text);
    msg.lang = parts[index].lang;
    msg.rate = 0.82;
    msg.pitch = 1;

    msg.onend = function(){
        setTimeout(function(){
            speakParts(parts,index+1);
        },1000);
    };

    window.speechSynthesis.speak(msg);
}

function turnVoiceOn(){
    voiceOn = true;
    alert("문제 음성이 켜졌습니다.");
}

function turnVoiceOff(){
    voiceOn = false;
    window.speechSynthesis.cancel();
    alert("문제 음성이 꺼졌습니다.");
}

function loadCSVAutomatically(){
    fetch("questions.csv?time=" + new Date().getTime(), {cache:"no-store"})
    .then(response => {
        if(!response.ok){ throw new Error("CSV 없음"); }
        return response.text();
    })
    .then(text => {
        quizData = parseCSV(text);
        document.getElementById("speech").innerHTML =
        "문제 " + quizData.length + "개를 불러왔습니다. 유형을 선택하세요.";
    })
    .catch(error => {
        document.getElementById("speech").innerHTML =
        "questions.csv 파일을 찾을 수 없습니다.<br>파일명과 위치를 확인하세요.";
        alert("questions.csv 로딩 실패");
    });
}

function parseCSVLine(line){
    const result = [];
    let current = "";
    let inQuotes = false;

    for(let i=0;i<line.length;i++){
        const char = line[i];

        if(char === '"' && line[i+1] === '"'){
            current += '"';
            i++;
        }else if(char === '"'){
            inQuotes = !inQuotes;
        }else if(char === "," && !inQuotes){
            result.push(current);
            current = "";
        }else{
            current += char;
        }
    }

    result.push(current);
    return result;
}

function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const data = [];

    for(let i=1;i<lines.length;i++){
        const line = lines[i].trim();
        if(line === ""){ continue; }

        const row = parseCSVLine(line);

        if(row.length >= 12){
            data.push({
                number: row[0] || "",
                category: row[1] || "",
                concept: row[2] || "",
                question: fixText(row[3] || ""),
                choice1: row[4] || "",
                choice2: row[5] || "",
                choice3: row[6] || "",
                choice4: row[7] || "",
                answer: row[8] || "",
                explanation: row[9] || "",
                translation: row[10] || "",
                hint: row[11] || ""
            });
        }
    }

    return data;
}

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function startQuiz(category){
    if(quizData.length === 0){
        alert("문제 데이터를 아직 불러오지 못했습니다.");
        return;
    }

    if(category === "전체"){
        selectedQuiz = shuffle([...quizData]);
    }else{
        selectedQuiz = shuffle(quizData.filter(q => q.category === category));
    }

    if(selectedQuiz.length === 0){
        alert("해당 유형의 문제가 없습니다.");
        return;
    }

    quizMode = category;
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function loadQuestion(){
    let q = selectedQuiz[currentQuestion];

    document.getElementById("teacherImage").src = "teacher.png";

    if(q.category === "빈칸추론형"){
        document.getElementById("speechBox").innerHTML = "빈칸에 가장 알맞은 말을 고르세요.";
    }else if(q.category === "문장삽입형"){
        document.getElementById("speechBox").innerHTML = "문맥상 가장 자연스러운 위치를 고르세요.";
    }else if(q.category === "어법오류찾기"){
        document.getElementById("speechBox").innerHTML = "어법상 틀린 부분을 고르세요.";
    }else{
        document.getElementById("speechBox").innerHTML = "문제를 읽고 가장 알맞은 답을 고르세요.";
    }

    document.getElementById("categoryText").innerHTML = "유형: " + escapeHTML(q.category);

    document.getElementById("number").innerHTML =
    "문제 " + (currentQuestion+1) + " / " + selectedQuiz.length;

    document.getElementById("score").innerHTML =
    "점수: " + score + " / " + selectedQuiz.length;

    document.getElementById("conceptBox").innerHTML =
    q.concept ? "💡 출제 개념:<br>" + escapeHTML(q.concept) : "";

    document.getElementById("question").innerHTML = formatQuestion(q);

    document.getElementById("result").innerHTML = "";
    document.getElementById("explanation").innerHTML = "";
    document.getElementById("tipBox").style.display = "none";
    document.getElementById("tipBox").innerHTML = "";

    makeAnswerButtons(q);

    answered = false;
    speakQuestion(q.question);
}

function makeAnswerButtons(q){
    const area = document.getElementById("answerButtons");
    area.innerHTML = "";

    area.innerHTML += '<button onclick="checkAnswer(\'1\')">1. ' + escapeHTML(q.choice1) + '</button>';
    area.innerHTML += '<button onclick="checkAnswer(\'2\')">2. ' + escapeHTML(q.choice2) + '</button>';
    area.innerHTML += '<button onclick="checkAnswer(\'3\')">3. ' + escapeHTML(q.choice3) + '</button>';
    area.innerHTML += '<button onclick="checkAnswer(\'4\')">4. ' + escapeHTML(q.choice4) + '</button>';
}

function toggleTip(){
    const box = document.getElementById("tipBox");
    const q = selectedQuiz[currentQuestion];

    if(box.style.display === "block"){
        box.style.display = "none";
        return;
    }

    box.style.display = "block";
    let correctText = q["choice" + q.answer] || "";

    box.innerHTML =
        "<b>Tip</b><br><br>" +
        "<b>힌트:</b><br>" +
        escapeHTML(q.hint || "힌트가 입력되지 않았습니다.") +
        "<br><br>" +
        "<b>문장 전체 해석:</b><br>" +
        escapeHTML(q.translation || "해석이 입력되지 않았습니다.") +
        "<br><br>" +
        "<b>핵심 정답 표현:</b><br>" +
        escapeHTML(correctText);
}

function checkAnswer(answer){
    if(answered){ return; }

    answered = true;
    let q = selectedQuiz[currentQuestion];

    if(answer === q.answer){
        score++;
        document.getElementById("result").innerHTML = "정답입니다!";
        document.getElementById("teacherImage").src = "correct.png";

        if(quizMode === "오답노트"){
            removeFromWrongNote(q);
        }
    }else{
        document.getElementById("result").innerHTML = "오답입니다.";
        document.getElementById("teacherImage").src = "wrong.png";
        saveWrongQuestion(q);
    }

    document.getElementById("score").innerHTML =
    "점수: " + score + " / " + selectedQuiz.length;

    let correctText = q["choice" + q.answer] || "";

    document.getElementById("explanation").innerHTML =
        "정답: " + escapeHTML(q.answer) + ". " + escapeHTML(correctText) +
        "<br><br>" +
        "해설: " + escapeHTML(q.explanation);
}

function nextQuestion(){
    if(!answered){
        alert("먼저 답을 선택하세요.");
        return;
    }

    if(currentQuestion === selectedQuiz.length - 1){
        showFinalScreen();
        return;
    }

    currentQuestion++;
    loadQuestion();
}

function showFinalScreen(){
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "block";

    document.getElementById("finalScore").innerHTML =
    "최종 점수: " + score + " / " + selectedQuiz.length;

    let percent = Math.round(score / selectedQuiz.length * 100);
    let message = "";

    if(percent >= 90){
        message = "매우 좋습니다. 핵심 구문과 어법을 안정적으로 이해하고 있습니다.";
    }else if(percent >= 70){
        message = "좋습니다. 오답노트를 반복하면 더 좋아집니다.";
    }else{
        message = "오답노트를 중심으로 다시 반복하는 것이 좋습니다.";
    }

    document.getElementById("finalMessage").innerHTML = message;
}

function restartSameQuiz(){
    selectedQuiz = shuffle([...selectedQuiz]);
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function saveWrongQuestion(q){
    let wrongNote = JSON.parse(localStorage.getItem(WRONG_NOTE_KEY)) || [];
    let exists = wrongNote.some(item => item.question === q.question);

    if(!exists){
        wrongNote.push(q);
        localStorage.setItem(WRONG_NOTE_KEY, JSON.stringify(wrongNote));
    }
}

function removeFromWrongNote(q){
    let wrongNote = JSON.parse(localStorage.getItem(WRONG_NOTE_KEY)) || [];
    wrongNote = wrongNote.filter(item => item.question !== q.question);
    localStorage.setItem(WRONG_NOTE_KEY, JSON.stringify(wrongNote));
}

function startWrongQuiz(){
    const wrongNote = JSON.parse(localStorage.getItem(WRONG_NOTE_KEY)) || [];

    if(wrongNote.length === 0){
        alert("저장된 오답이 없습니다.");
        return;
    }

    selectedQuiz = shuffle([...wrongNote]);
    quizMode = "오답노트";
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function showWrongNote(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "block";

    let wrongNote = JSON.parse(localStorage.getItem(WRONG_NOTE_KEY)) || [];
    let html = "";

    if(wrongNote.length === 0){
        html = "<p>아직 저장된 오답이 없습니다.</p>";
    }else{
        wrongNote.forEach((q,index) => {
            html += "<div class='wrongItem'>";
            html += "<b>" + (index+1) + ". [" + escapeHTML(q.category) + "]</b><br>";

            if(q.concept){
                html += "<b>💡 출제 개념:</b><br>" + escapeHTML(q.concept) + "<br><br>";
            }

            html += formatQuestion(q) + "<br><br>";
            html += "1. " + escapeHTML(q.choice1) + "<br>";
            html += "2. " + escapeHTML(q.choice2) + "<br>";
            html += "3. " + escapeHTML(q.choice3) + "<br>";
            html += "4. " + escapeHTML(q.choice4) + "<br>";
            html += "<b>정답: " + escapeHTML(q.answer) + "</b><br>";
            html += "<span style='color:#555;'>" + escapeHTML(q.explanation) + "</span><br><br>";
            html += "<b>해석:</b><br>" + escapeHTML(q.translation || "") + "<br><br>";
            html += "<b>힌트:</b><br>" + escapeHTML(q.hint || "");
            html += "</div>";
        });
    }

    document.getElementById("wrongList").innerHTML = html;
}

function clearWrongNote(){
    const ok = confirm("오답노트를 모두 삭제할까요?");
    if(ok){
        localStorage.removeItem(WRONG_NOTE_KEY);
        showWrongNote();
    }
}

function goHome(){
    window.speechSynthesis.cancel();

    document.getElementById("startScreen").style.display = "block";
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";
}
