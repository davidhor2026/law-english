<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>법원직 민법 검수형 퀴즈</title>
<style>
body{background:#f2f2f2;font-family:Arial;text-align:center;padding:20px;}
.box{background:white;max-width:520px;margin:auto;padding:25px;border-radius:20px;}
img{width:190px;border-radius:20px;}
button{font-size:18px;padding:10px 18px;margin:7px;border:none;border-radius:12px;background:#2f80ed;color:white;cursor:pointer;}
.gray{background:#777}.red{background:#e74c3c}.green{background:#27ae60}
.question{font-size:21px;margin-top:18px;line-height:1.5;}
#speech,#speechBox{background:#fff4cc;padding:12px;border-radius:15px;margin:12px 0;font-weight:bold;}
#number,#score,#categoryText,#sourceText{color:#777;margin-top:8px;}
#result{margin-top:18px;font-size:22px;font-weight:bold;}
#explanation{margin-top:15px;color:#555;line-height:1.5;}
#quizScreen,#finalScreen,#wrongNoteScreen{display:none;}
</style>
</head>

<body>
<div class="box">
<h1>법원직 민법 검수형 퀴즈</h1>

<div id="startScreen">
    <img src="teacher.png">
    <div id="speech">검수 위험이 큰 최신 판례형은 줄이고, 현행법·확립 법리 중심으로 구성했습니다.</div>
    <button onclick="startQuiz('전체')">전체 랜덤</button>
    <button onclick="startQuiz('민법총칙')">민법총칙</button>
    <button onclick="startQuiz('물권법')">물권법</button>
    <button onclick="startQuiz('채권법')">채권법</button>
    <button onclick="startQuiz('가족법')">가족법</button>
    <br>
    <button class="red" onclick="showWrongNote()">오답노트 보기</button>
</div>

<div id="quizScreen">
    <img id="teacherImage" src="teacher.png">
    <div id="speechBox">문제를 풀어보세요.</div>
    <div id="categoryText"></div>
    <div id="sourceText"></div>
    <div id="number"></div>
    <div id="score"></div>

    <div class="question" id="question"></div>

    <button onclick="checkAnswer('O')">O</button>
    <button onclick="checkAnswer('X')">X</button>

    <br>
    <button onclick="nextQuestion()">다음 문제</button>
    <button class="gray" onclick="goHome()">처음으로</button>

    <div id="result"></div>
    <div id="explanation"></div>
</div>

<div id="finalScreen">
    <img src="correct.png">
    <h2>퀴즈 완료!</h2>
    <div id="finalScore" style="font-size:24px;font-weight:bold;"></div>
    <p id="finalMessage"></p>
    <button onclick="goHome()">처음으로</button>
    <button class="green" onclick="restartSameQuiz()">다시 풀기</button>
    <button class="red" onclick="showWrongNote()">오답노트 보기</button>
</div>

<div id="wrongNoteScreen">
    <h2>오답노트</h2>
    <div id="wrongList"></div>
    <button class="red" onclick="clearWrongNote()">오답노트 삭제</button>
    <button onclick="goHome()">처음으로</button>
</div>
</div>

<script>
const quizData = [
{category:"민법총칙",source:"검수형 안정문항",question:"미성년자가 법정대리인의 동의 없이 한 법률행위라도 단순히 권리만을 얻거나 의무만을 면하는 행위라면 취소할 수 없다.",answer:"O",explanation:"제한능력자 규정의 대표 예외입니다. ‘미성년자 행위는 항상 취소 가능’이라는 표현이 함정입니다."},
{category:"민법총칙",source:"검수형 안정문항",question:"비진의표시는 원칙적으로 유효하지만, 상대방이 표의자의 진의 아님을 알았거나 알 수 있었을 경우에는 무효이다.",answer:"O",explanation:"비진의표시의 기본 구조입니다."},

{category:"민법총칙",source:"검수형 안정문항",question:"제3자의 사기에 의한 의사표시는 상대방이 그 사실을 알았거나 알 수 있었을 경우에 취소할 수 있다.",answer:"O",explanation:"제3자 사기에서는 상대방의 악의 또는 과실이 핵심입니다."},
{category:"민법총칙",source:"검수형 안정문항",question:"무권대리행위는 본인이 추인하면 특별한 사정이 없는 한 계약 시에 소급하여 효력이 생긴다.",answer:"O",explanation:"무권대리 추인의 소급효입니다."},

{category:"채권법",source:"검수형 안정문항",question:"지명채권의 양도를 채무자에게 대항하려면 양도인의 통지 또는 채무자의 승낙이 필요하다.",answer:"O",explanation:"채권양도의 대항요건입니다."},
{category:"채권법",source:"검수형 안정문항",question:"상계는 상대방에 대한 의사표시로 한다.",answer:"O",explanation:"상계는 일방적 의사표시입니다."},

{category:"채권법",source:"검수형 안정문항",question:"계약이 해제되면 손해배상청구는 할 수 없다.",answer:"X",explanation:"계약해제와 손해배상청구는 병존할 수 있습니다."},
{category:"채권법",source:"검수형 안정문항",question:"채권자대위권은 원칙적으로 채무자가 자기 권리를 행사하지 않을 때 문제된다.",answer:"O",explanation:"채무자의 권리 불행사가 중요한 요건입니다."},
{category:"채권법",source:"검수형 안정문항",question:"연대채무자 중 1인이 변제하면 그 범위에서 다른 연대채무자도 채무를 면한다.",answer:"O",explanation:"변제는 다른 연대채무자에게도 영향을 미치는 대표 사유입니다."},

{category:"가족법",source:"2026 현행법 반영",question:"사실혼 배우자는 특별한 사정이 없는 한 민법상 법정상속인이 아니다.",answer:"O",explanation:"사실혼은 일정한 보호를 받지만, 법정상속권은 인정되지 않습니다."},

{category:"가족법",source:"검수형 안정문항",question:"태아는 상속순위에 관하여 이미 출생한 것으로 본다.",answer:"O",explanation:"태아의 상속능력은 빈출 포인트입니다."},
{category:"가족법",source:"검수형 안정문항",question:"상속포기는 상속개시 전에도 미리 할 수 있다.",answer:"X",explanation:"상속포기는 상속개시 후에만 가능합니다."},
{category:"가족법",source:"검수형 안정문항",question:"상속인은 상속개시 있음을 안 날부터 원칙적으로 3개월 내에 단순승인, 한정승인 또는 포기를 할 수 있다.",answer:"O",explanation:"3개월 기간은 상속법의 기본 숫자 함정입니다."},
{category:"가족법",source:"검수형 안정문항",question:"상속포기자의 직계비속은 그 상속포기자를 대습하여 상속할 수 있다.",answer:"X",explanation:"상속포기는 대습상속 원인이 아닙니다."},
{category:"가족법",source:"검수형 안정문항",question:"상속재산의 분할은 상속개시된 때에 소급하여 효력이 있으나, 제3자의 권리를 해하지 못한다.",answer:"O",explanation:"상속재산분할의 소급효와 제3자 보호를 함께 기억해야 합니다."},
{category:"가족법",source:"검수형 안정문항",question:"공동상속인 중 특별수익자가 있으면 그 수익은 상속분 산정에서 고려될 수 있다.",answer:"O",explanation:"특별수익은 공동상속인 사이의 형평을 위한 제도입니다."},
{category:"가족법",source:"2026 현행법 반영",question:"형제자매는 현재 유류분권자로 인정된다.",answer:"X",explanation:"형제자매 유류분은 2024년 헌재 위헌 결정 및 이후 개정 흐름에 따라 인정되지 않습니다."},
{category:"가족법",source:"2026 현행법 반영",question:"피상속인의 직계비속과 배우자의 유류분은 각 법정상속분의 2분의 1이다.",answer:"O",explanation:"직계비속과 배우자의 유류분 비율은 법정상속분의 2분의 1입니다."}
];

let selectedQuiz=[];
let currentQuestion=0;
let score=0;
let answered=false;

function speak(text){
    window.speechSynthesis.cancel();
    let msg=new SpeechSynthesisUtterance(text);
    msg.lang="ko-KR";
    msg.rate=1;
    window.speechSynthesis.speak(msg);
}

function shuffle(array){
    return array.sort(()=>Math.random()-0.5);
}

function startQuiz(category){
    selectedQuiz = category==="전체" ? shuffle([...quizData]) : shuffle(quizData.filter(q=>q.category===category));

    currentQuestion=0;
    score=0;
    answered=false;

    document.getElementById("startScreen").style.display="none";
    document.getElementById("finalScreen").style.display="none";
    document.getElementById("wrongNoteScreen").style.display="none";
    document.getElementById("quizScreen").style.display="block";

    speak(category+" 퀴즈를 시작합니다.");
    loadQuestion();
}

function loadQuestion(){
    let q=selectedQuiz[currentQuestion];

    document.getElementById("teacherImage").src="teacher.png";
    document.getElementById("speechBox").innerHTML="문장을 끝까지 읽고 함정 표현을 확인하세요.";
    document.getElementById("categoryText").innerHTML="분야: "+q.category;
    document.getElementById("sourceText").innerHTML="검수표시: "+q.source;
    document.getElementById("number").innerHTML="문제 "+(currentQuestion+1)+" / "+selectedQuiz.length;
    document.getElementById("score").innerHTML="점수: "+score+" / "+selectedQuiz.length;
    document.getElementById("question").innerHTML=q.question;
    document.getElementById("result").innerHTML="";
    document.getElementById("explanation").innerHTML="";
    answered=false;
}

function checkAnswer(answer){
    if(answered){return;}

    answered=true;
    let q=selectedQuiz[currentQuestion];

    if(answer===q.answer){
        score++;
        document.getElementById("result").innerHTML="정답입니다!";
        document.getElementById("teacherImage").src="correct.png";
        document.getElementById("speechBox").innerHTML="좋습니다. 핵심 표현을 정확히 잡았습니다.";
        speak("정답입니다.");
    }else{
        document.getElementById("result").innerHTML="오답입니다.";
        document.getElementById("teacherImage").src="wrong.png";
        document.getElementById("speechBox").innerHTML="이 문제는 오답노트에 저장했습니다.";
        saveWrongQuestion(q);
        speak("오답입니다. 해설을 확인하세요.");
    }

    document.getElementById("score").innerHTML="점수: "+score+" / "+selectedQuiz.length;
    document.getElementById("explanation").innerHTML="정답: "+q.answer+"<br>"+q.explanation;
}

function nextQuestion(){
    if(!answered){
        alert("먼저 O 또는 X를 선택하세요.");
        return;
    }

    if(currentQuestion===selectedQuiz.length-1){
        showFinalScreen();
        return;
    }

    currentQuestion++;
    loadQuestion();
}

function showFinalScreen(){
    document.getElementById("quizScreen").style.display="none";
    document.getElementById("finalScreen").style.display="block";

    document.getElementById("finalScore").innerHTML="최종 점수: "+score+" / "+selectedQuiz.length;

    let percent=Math.round((score/selectedQuiz.length)*100);
    let message="";

    if(percent>=90){
        message="매우 좋습니다. 안정적으로 이해하고 있습니다.";
    }else if(percent>=70){
        message="좋습니다. 오답노트를 반복하면 더 좋아집니다.";
    }else{
        message="오답노트 중심으로 다시 반복하는 것이 좋습니다.";
    }

    document.getElementById("finalMessage").innerHTML=message;
    speak("퀴즈가 완료되었습니다.");
}

function restartSameQuiz(){
    selectedQuiz=shuffle([...selectedQuiz]);
    currentQuestion=0;
    score=0;
    answered=false;

    document.getElementById("finalScreen").style.display="none";
    document.getElementById("quizScreen").style.display="block";

    loadQuestion();
}

function goHome(){
    window.speechSynthesis.cancel();

    document.getElementById("startScreen").style.display="block";
    document.getElementById("quizScreen").style.display="none";
    document.getElementById("finalScreen").style.display="none";
    document.getElementById("wrongNoteScreen").style.display="none";
}

function saveWrongQuestion(q){
    let wrongNote=JSON.parse(localStorage.getItem("wrongNote"))||[];
    let exists=wrongNote.some(item=>item.question===q.question);

    if(!exists){
        wrongNote.push(q);
        localStorage.setItem("wrongNote",JSON.stringify(wrongNote));
    }
}

function showWrongNote(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("quizScreen").style.display="none";
    document.getElementById("finalScreen").style.display="none";
    document.getElementById("wrongNoteScreen").style.display="block";

    let wrongNote=JSON.parse(localStorage.getItem("wrongNote"))||[];
    let html="";

    if(wrongNote.length===0){
        html="<p>아직 저장된 오답이 없습니다.</p>";
    }else{
        wrongNote.forEach((q,index)=>{
            html+="<div style='text-align:left;background:#f7f7f7;margin:10px;padding:12px;border-radius:12px;'>";
            html+="<b>"+(index+1)+". ["+q.category+"]</b><br>";
            html+="<span style='color:#777;'>"+q.source+"</span><br>";
            html+=q.question+"<br>";
            html+="<b>정답: "+q.answer+"</b><br>";
            html+="<span style='color:#555;'>"+q.explanation+"</span>";
            html+="</div>";
        });
    }

    document.getElementById("wrongList").innerHTML=html;
}

function clearWrongNote(){
    localStorage.removeItem("wrongNote");
    showWrongNote();
}
</script>
</body>
</html>
